{{- $giscus := site.Params.giscus -}}
{{- if and $giscus $giscus.repoId $giscus.categoryId -}}
<section class="comments giscus" dir="auto">
  <h2 class="comments-title">{{ site.Params.commentsTitle | default "نظرات" }}</h2>
  <script
    src="https://giscus.app/client.js"
    data-repo="{{ $giscus.repo }}"
    data-repo-id="{{ $giscus.repoId }}"
    data-category="{{ $giscus.category }}"
    data-category-id="{{ $giscus.categoryId }}"
    data-mapping="{{ $giscus.mapping | default "pathname" }}"
    data-strict="{{ $giscus.strict | default "0" }}"
    data-reactions-enabled="{{ $giscus.reactionsEnabled | default "1" }}"
    data-emit-metadata="{{ $giscus.emitMetadata | default "0" }}"
    data-input-position="{{ $giscus.inputPosition | default "top" }}"
    data-theme="{{ $giscus.theme | default "preferred_color_scheme" }}"
    data-lang="{{ $giscus.lang | default "fa" }}"
    crossorigin="anonymous"
    async>
  </script>
</section>
<noscript>
  <p>{{ site.Params.commentsNoScript | default "برای گذاشتن نظر، JavaScript را فعال کنید." }}</p>
</noscript>
{{- else if site.Params.comments -}}
<section class="comments comments-setup" dir="auto">
  <h2 class="comments-title">{{ site.Params.commentsTitle | default "نظرات" }}</h2>
  <p>بخش نظرات هنوز پیکربندی نشده است.</p>
</section>
{{- end -}}
