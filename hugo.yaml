baseURL: https://example.org/
languageCode: en-us
title: Out of Distribution
theme: ["PaperMod"]
caches:
  images:
    dir: :cacheDir/images

params:
  mainSections:
    - posts
  comments: true
  commentsTitle: "نظرات"
  giscus:
    repo: mmsamiei/out-of-distribution
    repoId: "R_kgDOQGhj_Q"
    category: General
    categoryId: ""  # enable GitHub Discussions, then paste from https://giscus.app
    mapping: pathname
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: top
    theme: preferred_color_scheme
    lang: fa

outputs:
  home:
    - HTML
    - RSS
    - JSON

menus:
  main:
    - name: Posts
      url: /posts/
      weight: 10
    - name: Archive
      url: /archives/
      weight: 20
    - name: Search
      url: /search/
      weight: 30
    - name: Tags
      url: /tags/
      weight: 40
    - name: FAQ
      url: /faq/
      weight: 50
